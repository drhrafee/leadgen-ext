<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leadiction</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <img class="logo-icon" src="logo.png" alt="Leadiction Logo">
        <span class="logo-text">Leadiction</span>
      </div>
      

    </header>

    <!-- Main Content Area -->
    <main class="app-content">
      <!-- Scrape View -->
      <div id="tab-view-scrape" class="tab-view active">
        <!-- Controls -->
        <div class="control-panel">
          <button id="btn-scrape" class="action-btn submit-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <span id="btn-scrape-text">Start</span>
            <div class="spinner hidden" id="scrape-spinner"></div>
          </button>
          
          <button id="btn-stop" class="action-btn stop-btn" disabled>
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
            </svg>
            <span id="btn-stop-text">Stop</span>
          </button>
          
          <button id="btn-export-csv" class="action-btn secondary-btn" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Export CSV
          </button>
        </div>

        <!-- Auto-scroll settings -->
        <div class="scroll-options">
          <label class="switch-container">
            <input type="checkbox" id="chk-auto-scroll" checked>
            <span class="switch-label">Auto-scroll Google Maps list</span>
          </label>
          <div class="scroll-limit-group">
            <label for="num-scroll-limit">Max:</label>
            <input type="number" id="num-scroll-limit" value="50" min="10" max="250" step="10">
          </div>
        </div>

        <!-- Dashboard Stats -->
        <div class="stats-card">
          <span class="stats-label">Leads Detected</span>
          <span id="leads-count" class="stats-number">0</span>
        </div>

        <!-- Progress Indicator -->
        <div id="progress-container" class="progress-container hidden">
          <div class="progress-header">
            <span id="progress-label" class="progress-label">Deep-scraping websites...</span>
            <span id="progress-percentage" class="progress-percentage">0%</span>
          </div>
          <div class="progress-bar-wrapper">
            <div id="progress-bar" class="progress-bar" style="width: 0%;"></div>
          </div>
        </div>

        <!-- Table Preview Area -->
        <div class="preview-section">
          <div class="preview-header">
            <h3>Extracted Preview</h3>
            <button id="btn-clear-history" class="clear-btn" disabled title="Clear lead history">
              <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
              Clear History
            </button>
          </div>
          <div class="table-wrapper">
            <table id="preview-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Phone</th>
                  <th>Email</th>
                  <th>Website</th>
                </tr>
              </thead>
              <tbody id="preview-body">
                <tr class="empty-row">
                  <td colspan="4">No leads scraped yet. Open Google Maps or Search results and click Scrape.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>


    </main>

    <!-- Footer Toast Messages -->
    <div id="toast" class="toast hidden"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
